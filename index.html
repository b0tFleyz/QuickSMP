<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ QuickSMP Sezona 0 – Již brzy</title>
  <meta name="theme-color" content="#FFD700">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:   #0a0a0f;
      --card: #1a1a2e;
      --border: #2a2a3e;
      --text: #e2e8f0;
      --muted: #8892a4;
      --gold: #FFD700;
      --gold2: #FF8C00;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 560px;
    }

    .bolt {
      font-size: 4rem;
      line-height: 1;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 24px rgba(255,215,0,0.6));
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 16px rgba(255,215,0,0.5)); }
      50%       { filter: drop-shadow(0 0 36px rgba(255,215,0,0.9)); }
    }

    .logo {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 2.4rem;
      background: linear-gradient(135deg, #FFD700, #FF8C00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: .04em;
      margin-bottom: .4rem;
    }

    .season {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: .18em;
      text-transform: uppercase;
      margin-bottom: 2.8rem;
    }

    .coming {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 3.2rem;
      color: var(--text);
      letter-spacing: .06em;
      line-height: 1.1;
      margin-bottom: .8rem;
    }

    .coming span {
      background: linear-gradient(135deg, #FFD700, #FF8C00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      font-size: .95rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 2.8rem;
    }

    .socials {
      display: flex;
      gap: .8rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .socials a {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: .6rem 1.3rem;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: .95rem;
      text-decoration: none;
      transition: opacity .2s, transform .15s;
      border: 1px solid var(--border);
    }

    .socials a:hover { opacity: .8; transform: translateY(-2px); }

    .socials .dc { background: #5865F2; color: #fff; border-color: #5865F2; }
    .socials .yt { background: #FF0000; color: #fff; border-color: #FF0000; }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="wrap">
  <div class="bolt">⚡</div>
  <div class="logo">QuickSMP</div>
  <div class="season">Sezona 0</div>

  <div class="coming">Již <span>brzy&hellip;</span></div>
  <p class="sub">7denní Minecraft SMP turnaj se blíží.<br>Sleduj Discord pro více informací.</p>

  <div class="socials">
    <a class="dc" href="https://discord.gg/Ttk3bphd88" target="_blank" rel="noopener">💬 Discord</a>
    <a class="yt" href="https://www.youtube.com/@b0tFleyz" target="_blank" rel="noopener">▶ YouTube</a>
  </div>
</div>

<script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  let W, H, particles;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initParticles() {
    particles = Array.from({length: 55}, () => ({
      x  : Math.random() * W,
      y  : Math.random() * H,
      r  : Math.random() * 1.6 + 0.4,
      vx : (Math.random() - 0.5) * 0.35,
      vy : (Math.random() - 0.5) * 0.35,
      a  : Math.random() * 0.5 + 0.15,
      col: Math.random() > 0.5 ? '255,215,0' : '255,140,0',
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.col},${p.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  resize();
  initParticles();
  draw();
  window.addEventListener('resize', () => { resize(); initParticles(); });
</script>
</body>
</html>
